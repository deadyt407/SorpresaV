<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorpresa Especial</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            /* Fondo Morado */
            background: linear-gradient(135deg, #4a148c, #7b1fa2);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* CONTENEDOR PRINCIPAL */
        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 2.5rem;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 350px;
            z-index: 10;
            transition: all 0.5s ease;
        }

        h1 { color: #6a1b9a; margin-bottom: 1rem; font-size: 1.6rem; }

        .button-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 1.5rem;
        }

        button {
            background: #ab47bc;
            border: none;
            padding: 12px 25px;
            border-radius: 15px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        button:hover { transform: scale(1.1); background: #8e24aa; }

        .mensaje { margin-top: 20px; color: #4a148c; font-size: 1rem; min-height: 40px; font-weight: 500; }

        /* TICKET */
        .ticket {
            display: none;
            background: #f3e5f5;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            text-align: center;
            animation: fadeIn 1s ease;
            border: 2px dashed #ab47bc;
        }

        /* ICONO DE LA CARTA (FLOTANTE) */
        #icono-carta {
            display: none;
            position: fixed;
            right: 20px;
            bottom: 20px;
            font-size: 50px;
            cursor: pointer;
            z-index: 100;
            animation: bounce 2s infinite;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3));
        }

        /* MODAL DE LA CARTA */
        .modal-carta {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            z-index: 101;
            width: 80%;
            max-width: 300px;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        .modal-carta p { color: #4a148c; line-height: 1.6; font-size: 1.1rem; }
        
        .cerrar-carta {
            margin-top: 15px;
            background: #ce93d8;
            border: none;
            padding: 5px 15px;
            border-radius: 10px;
            cursor: pointer;
        }

        /* ANIMACIONES */
        .corazon-fall {
            position: fixed;
            top: -10%;
            font-size: 24px;
            animation: caer 6s linear infinite;
            z-index: 1;
        }

        @keyframes caer {
            to { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-20px);}
            60% {transform: translateY(-10px);}
        }
    </style>
</head>
<body>

    <div class="container" id="declaracion">
        <h1>¿Quieres salir conmigo? 💜</h1>
        <div class="button-group">
            <button onclick="Si()">Sí ❤️</button>
            <button onclick="No()">No 😢</button>
        </div>
        <div class="mensaje" id="mensaje"></div>
    </div>

    <div class="ticket" id="ticket">
        <h1 style="color: #4a148c;">🎟 Cita Confirmada</h1>
        <p>Prepárate para algo bonito 🥞☕</p>
        <p><strong>Lugar:</strong> A donde nos lleve el destino</p>
        <p><strong>Hora:</strong> Tú dime y ahí estaré</p>
        <p><strong>¡No faltes! 💜</strong></p>
    </div>

    <div id="icono-carta" onclick="abrirCarta()">📩</div>

    <div class="modal-carta" id="modalCarta">
        <p>
            Desde que llegaste a mi vida, todo cambió... 💖<br><br>
            No sé cómo explicarlo, pero me haces sentir algo diferente 🥺<br><br>
            ¡Me encantas mucho! 💘
        </p>
        <button class="cerrar-carta" onclick="cerrarCarta()">Cerrar</button>
    </div>

    <audio id="musica" preload="auto">
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <script>
        let contador = 0;
        const respuestas = [
            "¿Bonita pa' llantear pe? 🥺",
            "Ya p, dime que sí 🥺",
            "A ti te gusta BTS, pero a mí me gustas tú 😘",
            "Piénsalo bien, no te vas a arrepentir 💘",
            "Eres muy especial para mí 💖",
            "Bonita, no te botes pe 💌",
            "¿Me vas a decir que sí? 💞"
        ];

        function No() {
            const msjDiv = document.getElementById("mensaje");
            const index = Math.min(contador, respuestas.length - 1);
            msjDiv.innerHTML = respuestas[index];

            if (index === respuestas.length - 1) {
                msjDiv.innerHTML += `
                    <br>
                    <img src="dudu.png" width="100" style="margin-top:10px; border-radius:15px; animation: bounce 1s infinite;">
                `;
            }
            contador++;
        }

        function Si() {
            document.getElementById("declaracion").style.display = 'none';
            document.getElementById("ticket").style.display = 'block';
            document.getElementById("icono-carta").style.display = 'block'; // Aparece el sobre

            let audio = document.getElementById("musica");
            audio.volume = 0.5;
            audio.play();

            setInterval(crearCorazon, 300);
        }

        function abrirCarta() {
            document.getElementById("modalCarta").style.display = 'block';
        }

        function cerrarCarta() {
            document.getElementById("modalCarta").style.display = 'none';
        }

        function crearCorazon() {
            const c = document.createElement("div");
            c.className = "corazon-fall";
            c.innerHTML = (Math.random() > 0.5) ? "💜" : "💖";
            c.style.left = Math.random() * 100 + "vw";
            c.style.animationDuration = (Math.random() * 3 + 3) + "s";
            document.body.appendChild(c);
            setTimeout(() => c.remove(), 6000);
        }
    </script>
</body>
</html>
